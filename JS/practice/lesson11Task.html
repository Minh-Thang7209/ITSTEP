    <script>
        //1
        function onSuccess(result) {
            console.log(`Результат: ${result}`);
        }

        function onError(error) {
            console.log(`Помилка: ${error}`);
        }
        function calculate(a, b, onSuccess, onError) {
            if (b === 0) {
                onError("Ділення на нуль заборонено!");
            } else {
                onSuccess(Math.floor(a / b));
            }
        }
        calculate(10, 2, onSuccess, onError);
        calculate(10, 0, onSuccess, onError);
        //2
        function logElement(element) {
            console.log("Виводить: " + element.join(", "));
        }

        function squareElement(element) {
            return element * element;
        }



        function processArray(array, callback) {
            if (callback === logElement) {
                callback(array);
                return;
            }

            let result = [];

            for (let i = 0; i < array.length; i++) {
                result.push(callback(array[i]));
            }

            console.log(`Результат: [${result.join(", ")}]`);
        }

        processArray([1, 2, 3, 4, 5], logElement);
        processArray([1, 2, 3, 4, 5], squareElement);

        function checkEvenNumber(number) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (number % 2 === 0){
                        resolve(`Парне число: ${number}`);
                    } else{
                        resolve(`Непарне число: ${number}`);
                    }
                }, 1000);
            });
        }

            .then(result => console.log(result));
