        //2
        function delay(ms){
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        async function sumArrayAsync(array){
           if(array.length === 0){
                throw new Error("Масив порожній");
           } 

           let sum = 0;
           for (const current of array){
                await delay(1000);
                sum += current;
           }

           return sum;
    
        }

        async function main(){
            const numbers = [1, 2, 3, 4, 5];
            try{
                const result = await sumArrayAsync(numbers);
                console.log("Сума чисел:", result);
            } catch (ex){
                console.error("Помилка:", ex.message);
            }
        }
        main();
