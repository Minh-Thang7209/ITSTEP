<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        async function sayHello() {
            return "Hello";
        }

        sayHello().then((result) => console.log(result));

        async function processData() {
            const myPromise = new Promise((resolve) => 
            setTimeout(() => resolve("Дані отримано"), 2000));

            console.log('Очікуємо дані...');

            // myPromise.then((result) => console.log(result));
            const result = await myPromise;

            console.log(result);
        }

        processData();

        function getUserData() {
            return new Promise((resolve) => {
                setTimeout(() => resolve({id:1, name:'Олена'}), 1000);
            });
        }

        function getUserFriends(userId) {
            return new Promise((resolve) => {
                setTimeout(() => resolve(['Іван', 'Петро', 'Анастасія']), 1000);
            });
        }

        function fetchUser() {
            getUserData().then((user) => {
                return getUserFriends(user.id);
            })
            .then((friends) => {
                console.log(friends);
            })
        }

        async function fetchUserAsync() {
            const user = await getUserData();
            const friends = await getUserFriends(user.id);
            console.log(friends);
        }

        function getUserDetails(userId){
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if(userId === 1){
                        resolve({id: 1, name: "Oleksander", role: "Admin"});
                    } else{
                        reject(new Error(`User with ID ${userId} do not found in database...`));
                    }
                }, 1200);
            })
        }

        getUserDetails(1);
    </script>
</body>

</html>
