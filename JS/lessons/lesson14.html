    <h3>Створити новий загаловок</h3>
    <form id="postForm">
        <div>
            <label for="title">Загаловок:</label>
            <input type="text" name="title" id="title" required>
        </div>
        <br>
        <div>
            <label for="body">Текст:</label>
            <textarea name="body" id="title" rows="4" required></textarea>
        </div>
        <br>
        <button type="submit" id="submitBtn">Відправити на сервер</button>
    </form>
    <div id="postResult" style="margin-top: 15px; color: green; font-weight: bold;"></div>

    <form id="uploadForm" action="">
        <div>
            <label for="username">Ім'я користувача</label>
            <input type="text" name="username" id="username" required>
        </div>
        <br>
        <div>
            <label for="avatar">Фото профілю:</label>
            <input type="file" id="avatar" name="avatar" accept="image/*" required>
        </div>
        <br>
        <button type="submit" id="uploadBtn">Відправити</button>
    </form>
    <pre id="uploadResult"></pre>

        // createPost();

        const form = document.getElementById('postForm');
        const resultContainer = document.getElementById('postResult');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.textContent = 'Відправка...';
            resultContainer.textContent = '';
            const formData = new FormData(form);
            const formObject = Object.fromEntries(formData.entries());
            formObject.userId = 1;
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formObject)
                });
                if (!response.ok) throw new Error(`Помилка при створенні ${response.status}`);

                const result = await response.json();

                console.log('Успішно створено новий пост:', result);
            } catch (error) {
                console.error(error);
            } finally {
                submitBtn.disabled =false;
                submitBtn.textContent = "Відправити на сервер";
            }

        })

        const uploadForm = document.getElementById('uploadForm');
        const UploadResult = document.getElementById('uploadResult');
        const uploadButton = document.getElementById('uploadBtn');

        uploadForm.addEventListener('submit', async(e) => {
            e.preventDefault();
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Віправка...';
            UploadResult.style.color = "black";

            const formData = new FormData(uploadForm);
            try{
                const response = await fetch('https://httpbin.org/post', {
                    method: 'POST',
                    body: formData
                    // Важливо: Ми навмисно Не вказуємо тут 'Content-Type'!
                    // Браузер сам встановить Content-Type: multipart/form-data
                });
                if (!response.ok) throw new Error(`Помилка: ${response.status}`);
                const data = await response.json();
                console.log('Повна відповідь сервера: ', data);

                const serverReceiveForm = data.form;
                const serverReceiveFiles = data.files;

                uploadResult.textContent = `Успіх! Дані, що були надіслані на сервер:
                    Текстові поля:
                    - username: ${serverReceiveForm.username}
                    
                    Отримані файли:
                    - avatar: (зображення на ${serverReceiveFiles.avatar.length} байт) `
            } catch(error){
                console.log(error);
            }
        });
