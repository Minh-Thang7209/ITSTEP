<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button onclick="sendRequest()">Send</button>
    <button onclick="sendPostRequest()">POST</button>
    <h2>Реєстрація користувача</h2>
    <form id="registrationForm">
        <div>
            <label for="userName">Ім'я:</label>
            <input type="text" id="userName" name="username" required>
        </div>
        <br>
        <div>
            <label for="userEmail">Email:</label>
            <input type="email" id="userEmail" name="email" required>
        </div>
        <br>
        <button type="submit">Відправити дані</button>
    </form>

    <div id="resultMessage" style="margin-top: 15px; color: green;"></div>
    <script>
        function sendRequest() {
            const xhr = new XMLHttpRequest();
            xhr.open('GET', 'https://jsonplaceholder.typicode.com/users');
            xhr.onload = function () {
                if (xhr.status >= 200 && xhr.status < 300) {
                    const data = JSON.parse(xhr.response);
                    console.log("Отриманні користувачі:", data);
                } else {
                    console.error("Помилка запиту:", xhr.status);
                }
            }
            xhr.send();
        }


        function sendPostRequest() {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://jsonplaceholder.typicode.com/posts');
            xhr.setRequestHeader('Content-Type', 'application/json');

            const newPost = {
                title: 'Why JavaScript it the best programming language?',
                body: 'It is not',
                userId: 1
            };
            xhr.onload = () => {
                if (xhr.status >= 200 && xhr.status < 300) {
                    const responseData = JSON.parse(xhr.response);
                    console.log("Успіх:", responseData);
                } else {
                    console.error(`Помилка: ${xhr.status} ${xhr.statusText}`);
                }
            }

            xhr.onerror = function () {
                console.error("Сталася помилка. Запит взагалі не дійшов до сервера.");
            }

            xhr.send(JSON.stringify(newPost));
        };

        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById('registrationForm');
            const resultMessage = document.getElementById('result Message');

            form.addEventListener('submit', function (event) {
                event.preventDefault();
                const formData = new FormData(form);
                const formObject = Object.fromEntries(formData.entries());

                console.log("Зібранні дані для відправки:", formObject);
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://jsonplaceholder.typicode.com/users');
                xhr.setRequestHeader('Content-Type', 'application-json');

                xhr.onload = function () {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        const responseData = JSON.parse(xhr.response);
                        console.log("Віповідь від сервера:", responseData);
                        resultMessage.textContent = `Успіх! Користувач ${responseData.username} створено (ID: ${responseData.id})`;
                        resultMessage.style.color = "green";
                        form.reset();
                    } else {
                    resultMessage.textContent = `Помилка: ${xhr.status}`;
                    resultMessage.style.color = "red";
                }


                }
            })
        })


    </script>
</body>

</html>
