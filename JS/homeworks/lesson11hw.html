<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //1
        function doubleElement(element) {
            return element.map(num => num * 2);
        }
        function reverseElement(element) {
            return element.map(str => str.split('').reverse().join(''));
        }

        function processArray(array, callback) {
            const result = callback(array);
            console.log(result);
        }


        processArray([1, 2, 3, 4, 5], doubleElement);
        processArray(["hello", "world"], reverseElement);

        //2
        function isEven(number) {
            return number % 2 == 0;
        }
        function isShortWord(word) {
            return word.length <= 4;
        }

        function filterArray(array, callback) {
            const result = [];

            for (const element of array) {
                if (callback(element)) {
                    result.push(element);
                }
            }

            return result;
        }

        console.log(filterArray([1, 2, 3, 4, 5], isEven));
        console.log(filterArray(["cat", "elephant", "dog", "bird"], isShortWord));

        //3
        function washDishes() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve("Посуд вимито");
                }, 2000);
            });
        };

        function cleanRoom() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve("Кімнату прибрано")
                }, 4000);
            });
        };

        function makeDinner() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve("Вечеря приготована");
                }, 7000);
            });
        }

        washDishes()
            .then(result => console.log(result));

        cleanRoom()
            .then(result => console.log(result));

        makeDinner()
            .then(result => console.log(result));

        //4
        function sortArray(array) {
            return new Promise((resolve, reject) => {
                if (array.length === 0) {
                    reject("Масив порожній");
                    return;
                }

                setTimeout(() => {
                    const sorted = [...array].sort((a, b) => a - b);
                    resolve(sorted);
                }, 2000);
            });
        }

        sortArray([5, 2, 9, 1, 3])
            .then(result => {
                console.log("Відсортований масив:", result);
            })
            .catch(error => {
                console.log("Помилка:", error);
            });

        sortArray([])
            .then(result => {
                console.log(result);
            })
            .catch(error => {
                console.log("Помилка:", error);
            });
    </script>
</body>

</html>
