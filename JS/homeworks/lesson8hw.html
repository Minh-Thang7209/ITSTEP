<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }

        #messageList {
            list-style: none;
            padding: 0;
        }

        #messageList li {
            background: #eee;
            margin: 10px;
            padding: 15px;
            border-radius: 5px;
        }

        .author {
            font-weight: bold;
        }

        form {
            margin-bottom: 40px;
        }

        input,
        textarea,
        select {
            width: 300px;
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 10px 20px;
        }

        .result {
            font-weight: bold;
            margin: 20px;
        }
    </style>
    </style>
</head>

<body>
    <h1>Завдання 1. Форум</h1>


    <ul id="messageList">

        <li>
            <span class="author">Олена:</span>
            Вітаю всіх на форумі!
        </li>

        <li>
            <span class="author">Іван:</span>
            Гарного дня!
        </li>

    </ul>



    <form id="messageForm">

        <label>Ім'я:</label><br>
        <input id="author" required>

        <br>

        <label>Повідомлення:</label><br>

        <textarea id="message" required></textarea>

        <br>

        <button>
            Додати повідомлення
        </button>

    </form>





    <h1>Завдання 2. Тест</h1>


    <form id="quiz">


        <p>
            1. Скільки букв у слові "Hello"?
        </p>

        <input type="radio" name="q1" value="1">
        5

        <input type="radio" name="q1" value="0">
        2



        <p>
            2. HTML це:
        </p>

        <input type="radio" name="q2" value="1">
        Мова розмітки

        <input type="radio" name="q2" value="0">
        Графічний редактор



        <br><br>

        <button type="button" onclick="checkQuiz()">
            Завершити тест
        </button>


    </form>


    <p id="quizResult" class="result"></p>





    <h1>Завдання 3. Стилізований текст</h1>



    <textarea id="text" placeholder="Введіть текст"></textarea>


    <br>


    <label>
        <input type="checkbox" id="bold">
        Жирний
    </label>


    <label>
        <input type="checkbox" id="italic">
        Курсив
    </label>


    <label>
        <input type="checkbox" id="underline">
        Підкреслений
    </label>


    <br>


    Вирівнювання:

    <br>


    <input type="radio" name="align" value="left" checked>
    Ліворуч


    <input type="radio" name="align" value="center">
    По центру


    <input type="radio" name="align" value="right">
    Праворуч



    <br><br>


    <button onclick="showText()">
        Показати текст
    </button>


    <p id="styledText"></p>



    <script>
        document
            .getElementById("messageForm")
            .addEventListener("submit", function (e) {


                e.preventDefault();


                let author =
                    document.getElementById("author").value;


                let message =
                    document.getElementById("message").value;


                let li = document.createElement("li");


                li.innerHTML =
                    `
<span class="author">
${author}:
</span>
${message}
`;


                document
                    .getElementById("messageList")
                    .appendChild(li);


                this.reset();


            });





        // ===== Завдання 2 =====


        function checkQuiz() {


            let score = 0;


            let answers =
                document.querySelectorAll(
                    "#quiz input:checked"
                );


            answers.forEach(function (a) {

                score += Number(a.value);

            });


            document
                .getElementById("quizResult")
                .innerHTML =
                "Правильних відповідей: "
                + score;


        }






        // ===== Завдання 3 =====


        function showText() {


            let output =
                document.getElementById("styledText");


            output.innerHTML =
                document.getElementById("text").value;



            output.style.fontWeight =
                document.getElementById("bold").checked
                    ? "bold" : "normal";



            output.style.fontStyle =
                document.getElementById("italic").checked
                    ? "italic" : "normal";



            output.style.textDecoration =
                document.getElementById("underline").checked
                    ? "underline" : "none";



            let align =
                document.querySelector(
                    'input[name="align"]:checked'
                ).value;


            output.style.textAlign = align;


        }


    </script>
</body>

</html>
