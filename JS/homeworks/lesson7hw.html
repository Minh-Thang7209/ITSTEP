<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        section {
            margin-bottom: 40px;
            padding: 15px;
            border: 1px solid #ccc;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        #field {
            width: 100%;
            height: 400px;
            background: green;
            position: relative;
            overflow: hidden;
        }

        #ball {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            position: absolute;
            transition: .5s;
        }

        #trafficLight {
            width: 100px;
            background: #333;
            padding: 10px;
        }

        .light {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: gray;
            margin: 10px auto;
        }

        #books li {
            cursor: pointer;
            padding: 10px;
        }

        .tooltip {
            position: absolute;
            background: black;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <section>
        <h2>Завдання 1</h2>

        <input type="text" id="nameInput" placeholder="Введіть ім'я">
    </section>

    <section>
        <h2>Завдання 2</h2>

        <button id="openBtn">Відкрити</button>

        <div id="modal" class="modal">
            <div class="modal-content">
                <p>Це модальне вікно</p>
                <button id="closeBtn">Закрити</button>
            </div>
        </div>
    </section>

    <section>
        <h2>Завдання 3</h2>

        <div id="field">
            <div id="ball"><img id="ball" src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg"
                    alt="ball"></div>
        </div>
    </section>

    <section>
        <h2>Завдання 4</h2>

        <div id="trafficLight">
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
        </div>

        <br>

        <button id="nextBtn">Наступний колір</button>
    </section>

    <section>
        <h2>Завдання 5</h2>

        <ul id="books">
            <li>Кобзар</li>
            <li>Гаррі Поттер</li>
            <li>1984</li>
            <li>Майстер і Маргарита</li>
        </ul>
    </section>
    <script>
        const nameInput = document.getElementById("nameInput");

        nameInput.addEventListener("input", () => {
            nameInput.value = nameInput.value.replace(/[0-9]/g, "");
        });

        const modal = document.getElementById("modal");

        document.getElementById("openBtn").addEventListener("click", () => {
            modal.style.display = "flex";
        });

        document.getElementById("closeBtn").addEventListener("click", () => {
            modal.style.display = "none";
        });

        const field = document.getElementById("field");
        const ball = document.getElementById("ball");

        field.addEventListener("click", (e) => {

            let x = e.offsetX - 50;
            let y = e.offsetY - 50;

            const maxX = field.clientWidth - 100;
            const maxY = field.clientHeight - 100;

            x = Math.max(0, Math.min(x, maxX));
            y = Math.max(0, Math.min(y, maxY));

            ball.style.left = x + "px";
            ball.style.top = y + "px";
        });

        const lights = document.querySelectorAll(".light");

        const colors = ["red", "yellow", "green"];
        let current = 0;

        function updateLight() {
            lights.forEach(light => {
                light.style.background = "gray";
            });

            lights[current].style.background = colors[current];
        }

        updateLight();

        document.getElementById("nextBtn").addEventListener("click", () => {
            current = (current + 1) % colors.length;
            updateLight();
        });

        const books = document.querySelectorAll("#books li");

        books.forEach(book => {

            book.addEventListener("click", () => {

                books.forEach(item => {
                    item.style.background = "";
                });

                book.style.background = "orange";
            });

        });
    </script>
</body>

</html>
