<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        form {
            margin-bottom: 20px;
        }

        input,
        select,
        button {
            padding: 8px;
            margin-right: 5px;
        }

        #movies {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .movie-card {
            width: 220px;
            border: 1px solid #aaa;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-card h3 {
            font-size: 18px;
            margin: 10px 0;
            min-height: 70px;
        }

        .details-btn {
            margin-top: auto;
            padding: 8px;
        }

        #movieDetails {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #aaa;
        }

        #pagination {
            margin-top: 20px;
        }

        #pagination button {
            margin-right: 5px;
        }

        #movieDetails {
            margin-top: 30px;
            border-top: 1px solid #ccc;
            padding-top: 20px;
        }

        .details-card {
            max-width: 800px;
        }

        .details-card img {
            width: 250px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <h1>Movie Search</h1>

    <form id="searchForm">
        <input type="text" id="searchInput" placeholder="Enter movie title..." required>

        <select id="typeSelect">
            <option value="">All</option>
            <option value="movie">Movie</option>
            <option value="series">Series</option>
            <option value="episode">Episode</option>
        </select>

        <button type="submit">Search</button>
    </form>

    <div id="message"></div>

    <div id="movies"></div>

    <div id="pagination"></div>

    <div id="movieDetails"></div>

    <script src="script.js"></script>
    <script>
        const API_KEY = "ca582291";

        const searchForm = document.getElementById("searchForm");
        const searchInput = document.getElementById("searchInput");
        const typeSelect = document.getElementById("typeSelect");

        const moviesContainer = document.getElementById("movies");
        const paginationContainer = document.getElementById("pagination");
        const detailsContainer = document.getElementById("movieDetails");
        const message = document.getElementById("message");

        let currentSearch = "";
        let currentType = "";

        searchForm.addEventListener("submit", (e) => {
            e.preventDefault();

            currentSearch = searchInput.value.trim();
            currentType = typeSelect.value;

            loadMovies(1);
        });

        async function loadMovies(page) {

            moviesContainer.innerHTML = "";
            paginationContainer.innerHTML = "";
            detailsContainer.innerHTML = "";
            message.textContent = "";

            let url =
                `https://www.omdbapi.com/?apikey=${API_KEY}` +
                `&s=${encodeURIComponent(currentSearch)}` +
                `&page=${page}`;

            if (currentType) {
                url += `&type=${currentType}`;
            }

            try {

                const response = await fetch(url);
                const data = await response.json();

                if (data.Response === "False") {
                    message.textContent = "Movie not found!";
                    return;
                }

                renderMovies(data.Search);

                const totalResults = Number(data.totalResults);
                renderPagination(totalResults, page);

            } catch (error) {
                message.textContent = "Error loading movies!";
            }
        }

        function renderMovies(movies) {

            moviesContainer.innerHTML = "";

            movies.forEach(movie => {

                const card = document.createElement("div");

                card.classList.add("movie-card");

                card.innerHTML = `
            <img
                src="${movie.Poster !== "N/A"
                        ? movie.Poster
                        : "https://via.placeholder.com/300x450?text=No+Image"
                    }"
                alt="${movie.Title}"
            >

            <h3>${movie.Title}</h3>

            <p><strong>Year:</strong> ${movie.Year}</p>

            <p><strong>Type:</strong> ${movie.Type}</p>

            <button
                class="details-btn"
                data-id="${movie.imdbID}">
                Details
            </button>
        `;

                moviesContainer.appendChild(card);
            });

            document.querySelectorAll(".details-btn")
                .forEach(button => {

                    button.addEventListener("click", () => {
                        loadMovieDetails(button.dataset.id);
                    });

                });
        }

        function renderPagination(totalResults, currentPage) {

            const totalPages = Math.ceil(totalResults / 10);

            paginationContainer.innerHTML = "";

            for (let i = 1; i <= totalPages; i++) {

                const btn = document.createElement("button");

                btn.textContent = i;

                if (i === currentPage) {
                    btn.classList.add("active-page");
                }

                btn.addEventListener("click", () => {
                    loadMovies(i);
                });

                paginationContainer.appendChild(btn);
            }
        }

        async function loadMovieDetails(imdbID) {

            try {

                const response = await fetch(
                    `https://www.omdbapi.com/?apikey=${API_KEY}&i=${imdbID}`
                );

                const movie = await response.json();

                renderMovieDetails(movie);

                detailsContainer.scrollIntoView({
                    behavior: "smooth"
                });

            } catch (error) {

                detailsContainer.innerHTML =
                    "<h2>Error loading details</h2>";
            }
        }

        function renderMovieDetails(movie) {

            detailsContainer.innerHTML = `
        <div class="details-card">

            <h2>${movie.Title}</h2>

            <img src="${movie.Poster}" alt="${movie.Title}">

            <p><strong>Year:</strong> ${movie.Year}</p>

            <p><strong>Rated:</strong> ${movie.Rated}</p>

            <p><strong>Released:</strong> ${movie.Released}</p>

            <p><strong>Runtime:</strong> ${movie.Runtime}</p>

            <p><strong>Genre:</strong> ${movie.Genre}</p>

            <p><strong>Director:</strong> ${movie.Director}</p>

            <p><strong>Writer:</strong> ${movie.Writer}</p>

            <p><strong>Actors:</strong> ${movie.Actors}</p>

            <p><strong>Country:</strong> ${movie.Country}</p>

            <p><strong>Language:</strong> ${movie.Language}</p>

            <p><strong>Awards:</strong> ${movie.Awards}</p>

            <p><strong>IMDb Rating:</strong> ${movie.imdbRating}</p>

            <p><strong>Plot:</strong> ${movie.Plot}</p>

        </div>
    `;
        }
    </script>
</body>

</html>
