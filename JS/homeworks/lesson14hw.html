<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
        }

        .card {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            display: none;
        }

        .card img {
            width: 120px;
            border-radius: 50%;
        }

        .error {
            color: red;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <h1>Пошук користувача GitHub</h1>

    <input type="text" id="username" placeholder="Введіть GitHub username">
    <button id="searchBtn">Знайти</button>

    <div id="error" class="error"></div>

    <div id="userCard" class="card">
        <img id="avatar" alt="Avatar">
        <h2 id="name"></h2>
        <p>Репозиторії: <span id="repos"></span></p>
        <a id="profileLink" target="_blank">Перейти на профіль</a>
    </div>

    <script>
        const searchBtn = document.getElementById("searchBtn");
        const usernameInput = document.getElementById("username");

        searchBtn.addEventListener("click", async () => {
            const username = usernameInput.value.trim();

            if (!username) {
                return;
            }

            const card = document.getElementById("userCard");
            const error = document.getElementById("error");

            error.textContent = "";
            card.style.display = "none";

            try {
                const response = await fetch(
                    `https://api.github.com/users/${username}`
                );

                if (!response.ok) {
                    throw new Error("Користувача не знайдено");
                }

                const user = await response.json();

                document.getElementById("avatar").src = user.avatar_url;
                document.getElementById("name").textContent =
                    user.name || user.login;
                document.getElementById("repos").textContent =
                    user.public_repos;

                const profileLink =
                    document.getElementById("profileLink");
                profileLink.href = user.html_url;
                profileLink.textContent = user.html_url;

                card.style.display = "block";
            } catch (err) {
                error.textContent = err.message;
            }
        });
    </script>
</body>

</html>
